<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="Content-Language" content="ru">
        <title>Байкал</title>
        <link rel="icon" type="image/svg+xml" href="/icons/map.svg">
        <link rel="stylesheet" href="/lib/leaflet/leaflet.css">
        <script src="/lib/leaflet/leaflet.js"></script>
        <link rel="stylesheet" href="css/base.css">
        <link rel="stylesheet" href="css/layout.css">
        <link rel="stylesheet" href="css/sidebar.css">
        <link rel="stylesheet" href="css/layers.css">
        <link rel="stylesheet" href="css/modal.css">
        <link rel="stylesheet" href="css/map.css">
    </head>
    <body>         
      <!-- 🔘 кнопки --> 
      <div class="floating-container">
        <button id="layersBtn" class="floating-btn">
            <img src="/icons/layers.svg">
        </button>
    
        <button id="importBtn" class="floating-btn">
            <img src="/icons/map.svg">
        </button>
    
        <button id="uploadIconsBtn" class="floating-btn">
            <img src="/icons/ico.svg">
        </button>
      </div>
      
      <!-- 📂 sidebar --> 
      <div id="sidebar"> 
        
        <div class="sidebar-header">
          <h3>Управление слоями</h3> 
          <button class="modal-close" id="closeSidebar">
              <svg viewBox="0 0 24 24" width="18" height="18">
                  <path d="M6 6L18 18M18 6L6 18"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"/>
              </svg>
          </button>
        </div>
    
        <div id="sidebarContent"></div> 
    </div> 
      <!-- 🗺 карта --> 
      <div id="map"></div> 
      <!-- 📦 IMPORT MODAL --> 
      <div id="importModal" class="modal hidden"> 
        <div class="modal-content"> 
          <div class="modal-header"> 
            <h3>Импорт карты</h3> 
            <button class="modal-close" id="closeImport"> 
              <svg viewBox="0 0 24 24" width="18" height="18"> 
                <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/> 
              </svg> 
            </button> 
          </div> 
          <div class="modal-body"> 
            <div id="dropZone" class="drop-zone"> 
              <p>Перетащи ZIP сюда<br>или нажми для выбора</p> 
              <input type="file" id="fileInput" accept=".zip" hidden> 
            </div> <div id="fileInfo" class="hidden"></div> 
          </div> 
          <div class="modal-footer"> 
            <button id="uploadBtn" class="btn primary" disabled> Пересоздать карту </button> 
            <button id="cancelImport" class="btn secondary"> Отмена </button> 
          </div> 
        </div> 
      </div> 
      <!-- 🎨 STYLE MODAL --> 
       <div id="styleModal" class="modal hidden"> 
        <div class="modal-content"> 
          <div class="modal-header"> 
            <h3>Стиль слоя</h3> 
            <button class="modal-close" id="closeStyle"> 
              <svg viewBox="0 0 24 24" width="18" height="18"> 
                <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/> 
              </svg> 
            </button> 
          </div> 
          <div class="modal-body"> 
            <div class="form-row"> 
              <label>Цвет</label> 
              <input type="color" id="styleColor"> 
            </div> 
            <div class="form-row"> 
              <label>Размер</label> 
              <input type="range" id="styleRadius" min="2" max="20"> 
            </div> <div class="form-row"> 
              <label>Иконка</label> 
              <div id="iconGrid" class="icon-grid"></div> 
            </div> <div id="previewContainer"> 
              <div id="previewCircle"> 
                <img id="previewIcon"> 
              </div> 
            </div> 
          </div> 
          <div class="modal-footer"> 
            <button id="saveStyle" class="btn primary"> Сохранить </button> 
            <button id="cancelStyle" class="btn secondary"> Отмена </button> 
          </div> 
        </div> 
      </div>
      <div id="iconsModal" class="modal hidden">
        <div class="modal-content">
    
            <div class="modal-header">
                <h3>Загрузка иконок</h3>
                <button class="modal-close" id="closeIcons">✕</button>
            </div>
    
            <div class="modal-body">
                <div id="iconsDropZone" class="drop-zone">
                    <p>Перетащи SVG сюда<br>или нажми для выбора</p>
                    <input type="file" id="iconsInput" accept=".svg" multiple hidden>
                </div>
    
                <div id="iconsList"></div>
            </div>
    
            <div class="modal-footer">
                <button id="uploadIconsConfirm" class="btn primary" disabled>
                    Загрузить
                </button>
                <button id="cancelIcons" class="btn secondary">Отмена</button>
            </div>
    
        </div>
      </div>
      <script type="module" src="app.js"></script>
      <script>
          if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('/sw.js');
          }
      </script>
    </body>
</html>
