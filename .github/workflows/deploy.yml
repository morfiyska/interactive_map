name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 103.88.242.109
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/interactive_maps/baikal/
            git pull origin main
            systemctl restart baikal
